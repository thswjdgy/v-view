<!-- Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const textarea = document.getElementById('cover-letter-text');
            const charCount = document.getElementById('char-count');
            const uploadZone = document.getElementById('upload-zone');

            // Textarea character count
            if(textarea && charCount) {
                textarea.addEventListener('input', (e) => {
                    const length = e.target.value.length;
                    charCount.textContent = length.toLocaleString();
                    
                    if(length > 0) {
                        charCount.classList.add('text-primary');
                        charCount.classList.remove('text-outline-variant');
                    } else {
                        charCount.classList.remove('text-primary');
                        charCount.classList.add('text-outline-variant');
                    }
                });
            }

            // Upload Zone interaction simulation
            if(uploadZone) {
                uploadZone.addEventListener('click', () => {
                    // Visual feedback for click
                    uploadZone.style.transform = 'scale(0.98)';
                    setTimeout(() => {
                        uploadZone.style.transform = 'scale(1)';
                    }, 150);
                    
                    // In a real app, this would trigger a hidden <input type="file">
                    console.log("File upload dialog triggered");
                });

                // Simple drag over effect
                uploadZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    uploadZone.classList.add('border-primary-container', 'bg-surface-bright');
                });

                uploadZone.addEventListener('dragleave', () => {
                    uploadZone.classList.remove('border-primary-container', 'bg-surface-bright');
                });

                uploadZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadZone.classList.remove('border-primary-container', 'bg-surface-bright');
                    // Handle file drop logic here
                    console.log("File dropped");
                });
            }
        });
    </script>
