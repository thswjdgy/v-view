<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>v-view · 시선까지 잡아주는 AI 면접 코치</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
<style>
  :root{
    --mint:#2ec4a0;
    --mint-deep:#159a7d;
    --green-dark:#0f6b52;
    --ink:#1b2b27;
    --ink-soft:#5e716b;
    --ink-faint:#94a6a0;
    --line:#e4eeea;
    --line-soft:#eef5f2;
    --bg:#ffffff;
    --panel:#f4faf7;
    --panel-2:#eef7f3;
    --shadow:0 18px 50px -20px rgba(15,107,82,.28);
    --font:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,system-ui,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:var(--font);
    background:#0b1714;
    color:var(--ink);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  /* ---- Stage / scaling ---- */
  #viewport{position:fixed;inset:0;display:grid;place-items:center;}
  #stage{
    width:1280px;height:720px;position:relative;
    transform-origin:center center;
    background:var(--bg);
    overflow:hidden;
  }

  .slide{
    position:absolute;inset:0;
    padding:64px 76px;
    background:var(--bg);
    opacity:0;visibility:hidden;
    transition:opacity .45s ease;
    display:flex;flex-direction:column;
  }
  .slide.active{opacity:1;visibility:visible;}
  .slide.active .anim{animation:rise .6s cubic-bezier(.2,.7,.25,1) both;}
  .slide.active .anim:nth-child(2){animation-delay:.06s;}
  .slide.active .anim:nth-child(3){animation-delay:.12s;}
  .slide.active .anim:nth-child(4){animation-delay:.18s;}
  @keyframes rise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

  /* ---- Shared type ---- */
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-size:14px;font-weight:700;letter-spacing:.12em;
    color:var(--mint-deep);text-transform:uppercase;
  }
  .eyebrow::before{content:"";width:22px;height:2px;background:var(--mint);border-radius:2px;}
  h1.title{font-size:52px;line-height:1.12;font-weight:800;letter-spacing:-.02em;color:var(--ink);}
  h2.title{font-size:40px;line-height:1.15;font-weight:800;letter-spacing:-.02em;color:var(--ink);}
  .title .hl{color:var(--mint-deep);}
  .lead{font-size:20px;line-height:1.6;color:var(--ink-soft);font-weight:500;}
  .kicker{font-size:17px;font-weight:700;color:var(--mint-deep);letter-spacing:.01em;}

  .slide-head{margin-bottom:34px;}
  .slide-head .eyebrow{margin-bottom:14px;}
  .qa-tag{
    position:absolute;top:40px;right:76px;
    font-size:12.5px;font-weight:800;letter-spacing:.14em;
    color:var(--mint-deep);background:var(--panel-2);
    padding:7px 14px;border-radius:999px;text-transform:uppercase;
  }

  /* ---- Cards ---- */
  .grid{display:grid;gap:18px;}
  .card{
    background:var(--panel);border:1px solid var(--line);
    border-radius:18px;padding:24px 26px;
  }
  .card.line{
    background:#fff;border-left:4px solid var(--mint);
    border-radius:12px;box-shadow:0 6px 22px -16px rgba(15,107,82,.25);
  }
  .card .ct{font-size:19px;font-weight:800;color:var(--ink);margin-bottom:8px;}
  .card .cb{font-size:15.5px;line-height:1.55;color:var(--ink-soft);}
  .card .cb b{color:var(--ink);font-weight:700;}

  .num-card .idx{
    font-size:13px;font-weight:800;color:var(--mint-deep);
    letter-spacing:.05em;margin-bottom:10px;
    border-bottom:2px solid var(--line);padding-bottom:10px;
  }

  .pill{
    display:inline-flex;align-items:center;
    font-size:14px;font-weight:700;color:var(--mint-deep);
    background:var(--panel-2);border:1px solid var(--line);
    padding:9px 16px;border-radius:10px;
  }
  .pill.solid{background:var(--mint);color:#fff;border-color:var(--mint);}

  ul.bullets{list-style:none;display:flex;flex-direction:column;gap:13px;}
  ul.bullets li{position:relative;padding-left:26px;font-size:16.5px;line-height:1.5;color:var(--ink-soft);}
  ul.bullets li::before{content:"";position:absolute;left:4px;top:9px;width:9px;height:9px;border-radius:3px;background:var(--mint);}
  ul.bullets li b{color:var(--ink);font-weight:700;}

  .footnote{
    margin-top:auto;padding-top:20px;
    font-size:14px;color:var(--ink-faint);font-weight:500;
    border-top:1px solid var(--line-soft);
  }

  /* ---- Phone mock (cover) ---- */
  .phone{
    width:268px;height:540px;border-radius:42px;
    background:linear-gradient(160deg,#2a3a36,#11211d);
    padding:13px;box-shadow:var(--shadow);position:relative;
  }
  .phone .screen{
    width:100%;height:100%;border-radius:30px;overflow:hidden;
    background:linear-gradient(170deg,#e9f6f1,#ffffff 55%);
    display:flex;flex-direction:column;align-items:center;padding:28px 20px;
  }
  .phone .bar{height:6px;width:84px;background:var(--mint);border-radius:6px;margin:6px 0 22px;}
  .phone .ph-t{font-size:26px;font-weight:800;color:var(--ink);text-align:center;line-height:1.1;}
  .phone .avatar{width:78px;height:78px;border-radius:50%;background:linear-gradient(160deg,var(--mint),var(--mint-deep));margin:18px 0 22px;display:grid;place-items:center;color:#fff;font-size:30px;}
  .phone .opt{width:100%;padding:13px;border-radius:14px;border:1.5px solid var(--line);text-align:center;font-weight:700;color:var(--ink-soft);margin-bottom:11px;font-size:15px;}
  .phone .opt.go{background:var(--mint);color:#fff;border-color:var(--mint);}

  /* ---- Chart: WBS bars ---- */
  .barwrap{display:flex;flex-direction:column;gap:11px;}
  .barrow{display:grid;grid-template-columns:150px 1fr;align-items:center;gap:16px;}
  .barrow .lbl{font-size:13.5px;font-weight:700;color:var(--ink-soft);text-align:right;}
  .bartrack{height:30px;border-radius:8px;background:var(--panel-2);position:relative;overflow:hidden;}
  .barfill{height:100%;border-radius:8px;display:flex;align-items:center;justify-content:flex-end;padding-right:14px;color:#fff;font-weight:800;font-size:13px;transform-origin:left;}
  .slide.active .barfill{animation:grow .8s cubic-bezier(.2,.7,.25,1) both;}
  @keyframes grow{from{transform:scaleX(0);}to{transform:scaleX(1);}}

  /* ---- Timeline ---- */
  .timeline{display:flex;align-items:flex-start;gap:0;margin-top:8px;}
  .tnode{flex:1;position:relative;text-align:center;padding-top:30px;}
  .tline{position:absolute;top:9px;left:0;right:0;height:3px;background:var(--line);}
  .tnode:first-child .tline{left:50%;}
  .tnode:last-child .tline{right:50%;}
  .tdot{position:absolute;top:3px;left:50%;transform:translateX(-50%);width:15px;height:15px;border-radius:50%;background:var(--mint);border:3px solid #fff;box-shadow:0 0 0 2px var(--mint);}
  .tnode .tw{font-size:13px;font-weight:800;color:var(--mint-deep);}
  .tnode .td{font-size:12px;color:var(--ink-faint);margin:2px 0 4px;}
  .tnode .tt{font-size:13px;font-weight:600;color:var(--ink-soft);line-height:1.3;}

  /* ---- Big stats ---- */
  .stats{display:flex;gap:54px;}
  .stat .v{font-size:58px;font-weight:800;color:var(--ink);line-height:1;letter-spacing:-.02em;}
  .stat .v .u{color:var(--mint-deep);}
  .stat .k{font-size:15px;color:var(--ink-soft);font-weight:600;margin-top:8px;}

  /* ---- Table ---- */
  table.adr{width:100%;border-collapse:collapse;font-size:15.5px;}
  table.adr th{text-align:left;font-weight:800;color:var(--mint-deep);padding:12px 14px;border-bottom:2px solid var(--line);font-size:13.5px;letter-spacing:.04em;}
  table.adr td{padding:13px 14px;border-bottom:1px solid var(--line-soft);color:var(--ink-soft);}
  table.adr td.dec{font-weight:800;color:var(--ink);}
  table.adr td.code{font-weight:800;color:var(--mint-deep);font-feature-settings:"tnum";}

  /* ---- Code block ---- */
  pre.code{
    background:#0e201b;color:#cdeee2;border-radius:14px;
    padding:22px 24px;font-size:14px;line-height:1.7;
    font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
    overflow:auto;
  }
  pre.code .c{color:#6fae9c;}
  pre.code .g{color:#5fe0b6;}

  /* ---- Step flow ---- */
  .steps{display:flex;align-items:stretch;gap:14px;}
  .step{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px 18px;position:relative;}
  .step .sn{width:30px;height:30px;border-radius:50%;background:var(--mint);color:#fff;font-weight:800;font-size:15px;display:grid;place-items:center;margin-bottom:13px;}
  .step .st{font-size:15.5px;font-weight:800;color:var(--ink);margin-bottom:6px;}
  .step .sd{font-size:13.5px;line-height:1.5;color:var(--ink-soft);}
  .arrowflow{display:flex;align-items:center;gap:0;}
  .arrowflow .step{border-radius:16px;}
  .arrowflow .arr{color:var(--mint);font-size:22px;font-weight:800;padding:0 4px;}

  /* ---- Closing ---- */
  .closing{background:linear-gradient(155deg,#0f6b52,#159a7d 55%,#2ec4a0);align-items:center;justify-content:center;text-align:center;}
  .closing h1{color:#fff;font-size:64px;font-weight:800;letter-spacing:-.02em;}
  .closing p{color:rgba(255,255,255,.86);font-size:20px;font-weight:500;margin-top:18px;}
  .closing .lk{color:#fff;font-weight:700;margin-top:8px;font-size:17px;}

  .cover{background:radial-gradient(120% 140% at 80% 10%,#eafaf4 0%,#ffffff 55%);}

  /* ---- Nav UI ---- */
  #ui{position:fixed;inset:0;pointer-events:none;z-index:50;}
  #progress{position:fixed;top:0;left:0;height:4px;background:var(--mint);transition:width .35s ease;z-index:60;box-shadow:0 0 12px rgba(46,196,160,.6);}
  .navbtn{
    position:fixed;top:50%;transform:translateY(-50%);
    width:46px;height:46px;border-radius:50%;
    background:rgba(255,255,255,.9);border:1px solid var(--line);
    color:var(--ink);font-size:20px;cursor:pointer;pointer-events:auto;
    display:grid;place-items:center;box-shadow:0 8px 24px -10px rgba(0,0,0,.3);
    transition:transform .15s ease,background .15s ease;
  }
  .navbtn:hover{transform:translateY(-50%) scale(1.08);background:#fff;}
  #prev{left:22px;}#next{right:22px;}
  #counter{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:rgba(13,30,25,.82);color:#fff;font-size:13px;font-weight:600;
    padding:8px 16px;border-radius:999px;pointer-events:auto;cursor:default;
    letter-spacing:.03em;backdrop-filter:blur(6px);
  }
  #counter b{color:var(--mint);}
  #hint{
    position:fixed;bottom:20px;right:24px;color:rgba(255,255,255,.5);
    font-size:12px;pointer-events:none;
  }
  @media (max-width:600px){#prev,#next{width:38px;height:38px;font-size:16px;}#hint{display:none;}}
  @media (prefers-reduced-motion:reduce){
    .slide,.barfill,*{animation:none !important;transition:opacity .15s linear !important;}
  }
</style>
</head>
<body>

<div id="progress"></div>
<div id="viewport"><div id="stage"></div></div>

<div id="ui">
  <button class="navbtn" id="prev" aria-label="이전 슬라이드">‹</button>
  <button class="navbtn" id="next" aria-label="다음 슬라이드">›</button>
  <div id="counter"><b id="cur">1</b> / <span id="total">25</span></div>
  <div id="hint">← → 또는 스페이스로 이동</div>
</div>

<script>
/* ============ SLIDES ============ */
const slides = [

/* 1 — Cover */
`<section class="slide cover" style="flex-direction:row;align-items:center;gap:60px;">
  <div style="flex:1;">
    <div class="eyebrow anim" style="margin-bottom:22px;">최종발표 · 2026-06-22</div>
    <h1 class="title anim" style="font-size:88px;color:var(--mint-deep);letter-spacing:-.03em;">v-view</h1>
    <p class="lead anim" style="font-size:24px;margin-top:18px;max-width:520px;color:var(--ink);font-weight:600;">시선까지 잡아주는 AI 면접 코치<br>— 혼자서도, 실전처럼</p>
    <p class="anim" style="margin-top:14px;color:var(--ink-faint);font-size:15px;font-weight:500;">손정효 · github.com/thswjdgy/v-view</p>
    <div class="anim" style="display:flex;gap:10px;margin-top:28px;flex-wrap:wrap;">
      <span class="pill solid">FLUTTER</span><span class="pill">RIVERPOD</span>

    </div>

    <div class="screen">
      <div class="bar"></div>
      <div class="ph-t">Interview<br>Coach</div>
      <div class="avatar">🧑‍💼</div>
      <div class="opt">💬 Practice</div>
      <div class="opt">Questions</div>
      <div class="opt go">Feedback</div>
    </div>
  </div>
</section>`,

/* 2 — Problem framing */
`<section class="slide">
  <div class="slide-head anim">
    <div class="eyebrow">왜 v-view 인가</div>
    <h1 class="title">혼자 연습해도, 실제<br>면접관 앞에 있는 것처럼</h1>

  <p class="lead anim" style="border-left:4px solid var(--mint);padding-left:18px;max-width:760px;margin-bottom:30px;">

  </p>
  <div class="kicker anim" style="margin-bottom:16px;"><span style="color:var(--ink);">3박자</span> 경험</div>
  <div class="grid anim" style="grid-template-columns:repeat(3,1fr);">
    <div class="card num-card"><div class="idx">01</div><div class="cb"><b>AI가 질문을 던진다</b><br>직무·자소서 기반 맞춤 질문</div></div>
    <div class="card num-card"><div class="idx">02</div><div class="cb"><b>카메라가 시선을 본다</b><br>실시간 응시율 측정</div></div>
    <div class="card num-card"><div class="idx">03</div><div class="cb"><b>끝나면 리포트를 준다</b><br>개선 TOP3 즉시 제공</div></div>
  </div>
</section>`,

/* 3 — 3 limits */
`<section class="slide">
  <div class="slide-head anim">
    <div class="eyebrow">문제 정의</div>
    <h2 class="title">혼자 면접 준비의 <span class="hl">3가지 한계</span></h2>
  </div>
  <div class="grid anim" style="grid-template-columns:repeat(3,1fr);margin-bottom:30px;">
    <div class="card line"><div class="ct">실전 긴장감 부재</div><div class="cb">혼자서는 실전 같은 긴장감을 만들 수 없다.</div></div>
    <div class="card line"><div class="ct">객관적 피드백 없음</div><div class="cb">시선이 흔들리는지, 답이 두루뭉술한지 스스로 모른다.</div></div>
    <div class="card line"><div class="ct">맞춤 질문 부재</div><div class="cb">나에게 딱 맞는 질문을 받기 어렵다.</div></div>
  </div>
  <p class="lead anim" style="text-align:center;font-weight:700;color:var(--ink);background:var(--panel);padding:18px;border-radius:14px;">
    내가 지금 잘하고 있나를 알 수 없는 <span style="color:var(--mint-deep);">막막함</span>
  </p>
</section>`,

/* 4 — WBS timeline */
`<section class="slide">
  <div class="slide-head anim">
    <div class="eyebrow">프로젝트 관리</div>
    <h2 class="title">WBS &amp; 진행 현황</h2>
  </div>
  <div class="stats anim" style="margin-bottom:36px;">
    <div class="stat"><div class="v">9<span class="u">주</span></div><div class="k">W1~W9 계획</div></div>
    <div class="stat"><div class="v">8<span class="u">/8</span></div><div class="k">온타임 완주</div></div>

  </div>
  <div class="timeline anim">
    ${[["W1","4/20","기획·repo"],["W2","4/27","WBS·ADR"],["W3","5/4","아키텍처"],["W4","5/11","빌드·UI"],["W5","5/18","시선분석"],["W6","6/1","중간발표"],["W7","6/8","구현2·테스트"],["W8","6/15","통합점검"],["W9","6/22","최종발표"]].map(t=>`<div class="tnode"><div class="tline"></div><div class="tdot"></div><div class="tw">${t[0]}</div><div class="td">${t[1]}</div><div class="tt">${t[2]}</div></div>`).join("")}
  </div>
  <p class="footnote anim">5/25 공휴일 제외 · 전 단계 온타임 완주</p>
</section>`,

/* 5 — 100% chart */
`<section class="slide">
  <div class="slide-head anim" style="text-align:center;margin-bottom:24px;">
    <h2 class="title" style="font-size:34px;">프로젝트 진행 <span class="hl">100% 완료</span></h2>

    <div class="stat" style="text-align:center;"><div class="v">8<span class="u">/8</span></div><div class="k">온타임</div></div>
    <div class="stat" style="text-align:center;"><div class="v">6<span class="u">/22</span></div><div class="k">최종발표</div></div>

  <div class="barwrap anim">
    ${[["W1 기획·repo"],["W2 WBS·ADR·문서"],["W3 아키텍처·환경"],["W4 빌드·UI"],["W5 핵심화면·시선분석"],["W6 중간발표"],["W7 구현2·단위테스트"],["W8 통합점검·문서완비"],["W9 최종발표(오늘)"]].map((b,i)=>{
      const c=['#0f6b52','#16805f','#1c956d','#23a87c','#2ab98a','#34c79a','#48d0a8','#62d8b5','#80e0c4'][i];

/* 6 — Tech stack & AI chain */
`<section class="slide">

    <div class="anim">

/* ============ ENGINE ============ */
const stage=document.getElementById('stage');
stage.innerHTML=slides.join('');
const all=[...document.querySelectorAll('.slide')];
const total=all.length;
let idx=0;
document.getElementById('total').textContent=total;

function show(n){
  idx=Math.max(0,Math.min(total-1,n));
  all.forEach((s,i)=>s.classList.toggle('active',i===idx));
  document.getElementById('cur').textContent=idx+1;
  document.getElementById('progress').style.width=((idx+1)/total*100)+'%';
  location.hash=idx+1;
}
function next(){show(idx+1);}
function prev(){show(idx-1);}

document.getElementById('next').onclick=next;
document.getElementById('prev').onclick=prev;
document.addEventListener('keydown',e=>{
  if(['ArrowRight','ArrowDown',' ','PageDown'].includes(e.key)){e.preventDefault();next();}
  else if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){e.preventDefault();prev();}
  else if(e.key==='Home'){show(0);}else if(e.key==='End'){show(total-1);}
});
// swipe (mobile)
let tx=0;
stage.addEventListener('touchstart',e=>tx=e.changedTouches[0].clientX,{passive:true});
stage.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-tx;if(Math.abs(d)>50){d<0?next():prev();}},{passive:true});

/* fit to viewport */
function fit(){
  const s=Math.min(window.innerWidth/1280,window.innerHeight/720);
  stage.style.transform='scale('+s+')';
}
window.addEventListener('resize',fit);fit();

/* deep link */
const start=parseInt(location.hash.replace('#',''));
show(Number.isFinite(start)&&start>=1?start-1:0);
</script>
